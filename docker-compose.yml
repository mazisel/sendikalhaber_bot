services:
  sendikalhaber-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: sendikalhaber-bot:latest
    container_name: sendikalhaber-bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_HANDLER_TIMEOUT_MS: ${TELEGRAM_HANDLER_TIMEOUT_MS:-600000}
    volumes:
      - sendikalhaber_bot_storage:/app/storage

volumes:
  sendikalhaber_bot_storage:
